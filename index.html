<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Clovai — AI-powered diagram tools platform. Generate flowcharts, architecture diagrams, UML, BPMN, ER diagrams and more with AI."
    />
    <title>Clovai — AI Diagram Tools Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Prevent dark-mode flash before React mounts
      ;(function () {
        var theme = localStorage.getItem('clovai-theme')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (theme === 'dark' || (theme !== 'light' && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
