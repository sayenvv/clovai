services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clovai
      POSTGRES_USER: clovai
      POSTGRES_PASSWORD: clovai
    ports:
      - "5432:5432"
    volumes:
      - clovai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clovai -d clovai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  clovai-postgres-data:
